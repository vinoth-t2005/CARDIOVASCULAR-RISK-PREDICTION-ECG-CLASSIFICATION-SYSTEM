<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            margin: 0;
            color: #1e293b;
        }

        /* --- Sidebar (Unified Design) --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #ffffff;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #e2e8f0;
            padding-top: 30px;
            z-index: 1000;
        }

        .sidebar h3 {
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #2563eb;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .sidebar a {
            display: block;
            color: #64748b;
            padding: 12px 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 5px 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .sidebar a:hover {
            background: #eff6ff;
            color: #2563eb;
            transform: translateX(5px);
        }

        /* --- Main Content --- */
        .main {
            margin-left: 260px;
            padding: 40px;
        }

        h2 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 5px;
        }

        .sub-text {
            color: #64748b;
            margin-bottom: 35px;
        }

        /* --- Premium Analytics Cards --- */
        .analytics-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .analytics-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #d1e0ff;
        }

        .analytics-card h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .analytics-card .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        /* Status Styling */
        .status-pill {
            display: inline-flex;
            align-items: center;
            background: #f0fdf4;
            color: #166534;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
        }

        /* Card Accents */
        .accent-blue { border-top: 4px solid #3b82f6; }
        .accent-purple { border-top: 4px solid #8b5cf6; }
        .accent-green { border-top: 4px solid #10b981; }

    </style>
</head>

<body>

    <div class="sidebar">
        <h3>ADMIN PANEL</h3>
        <a href="/admin_dashboard">Dashboard</a>
        <a href="/admin_logs">User Activity</a>
        <a href="/manage_users">Manage Users</a>
        <a href="/system_stats">System Analytics</a>
        <a href="/logout" style="margin-top: 50px; color: #ef4444;">Logout</a>
    </div>

    <div class="main">
        <h2>System Analytics</h2>
        <p class="sub-text">In-depth performance metrics and platform statistics.</p>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="analytics-card accent-blue">
                    <h4>Total Users</h4>
                    <p class="stat-value">{{total_users}}</p>
                    <small style="color: #3b82f6; font-weight: 500;">Registered accounts</small>
                </div>
            </div>

            <div class="col-md-4">
                <div class="analytics-card accent-purple">
                    <h4>Total Searches</h4>
                    <p class="stat-value">{{total_search}}</p>
                    <small style="color: #8b5cf6; font-weight: 500;">Queries processed</small>
                </div>
            </div>

            <div class="col-md-4">
                <div class="analytics-card accent-green">
                    <h4>System Status</h4>
                    <div class="mt-2">
                        <span class="status-pill">
                            <span class="status-dot"></span> Active
                        </span>
                    </div>
                    <p class="mt-3" style="color: #64748b; font-size: 0.85rem;">All systems operational</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
