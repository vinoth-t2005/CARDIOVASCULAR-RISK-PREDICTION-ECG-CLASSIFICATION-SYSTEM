<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease AI | Ultra Bright UI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Bright & Vibrant Palette */
            --primary-gradient: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
            --btn-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-light: #f0f4f8;
            --glass-card: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            position: relative;
        }

        /* --- BRIGHT ANIMATED BACKGROUND --- */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #e0f2fe 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #fce7f3 0%, transparent 50%);
        }

        /* Animated Bright Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: moveOrb 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #FF9A8B;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #A18CD1;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #84fab0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: moveCenter 15s infinite alternate;
        }

        @keyframes moveOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 150px) scale(1.2);
            }
        }

        @keyframes moveCenter {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.4;
            }

            100% {
                transform: translate(-30%, -40%) scale(1.3);
                opacity: 0.6;
            }
        }

        /* --- GLASS CARD DESIGN --- */
        .hero-card {
            background: var(--glass-card);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 2px solid var(--glass-border);
            padding: 5rem 4rem;
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            max-width: 750px;
            width: 90%;
            text-align: center;
            animation: cardEntrance 1s ease-out;
            position: relative;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-weight: 800;
            font-size: 4rem;
            line-height: 1;
            letter-spacing: -3px;
            color: #0f172a;
            margin-bottom: 1.5rem;
        }

        h1 span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #475569;
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 400;
            max-width: 550px;
            margin: 0 auto;
        }

        /* --- INTERACTIVE BUTTON --- */
        .btn-action {
            background: var(--btn-grad);
            color: white !important;
            padding: 20px 50px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(118, 75, 162, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn-action:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 30px 60px rgba(118, 75, 162, 0.4);
        }

        /* Live Indicator */
        .status-pill {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #334155;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
        }

        .dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #10b981;
            border-radius: 50%;
            animation: ping 1.5s infinite;
        }

        @keyframes ping {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="bg-shapes"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container d-flex justify-content-center">
        
        <div class="hero-card">

            <div class="status-pill">
                <span class="dot"></span>
                CLINICAL AI IS LIVE
            </div>

            <h1>HEART AI <br><span>PRECISION</span></h1>

            <p>
                Revolutionizing cardiac diagnostics with real-time AI intelligence.
                Fast, reliable, and clinical-grade analysis at your fingertips.
            </p>

            <div class="mt-5">
                <a href="/dashboard" class="btn-action">
                    Launch Dashboard
                </a>
            </div>

            <div class="mt-5 pt-4 d-flex justify-content-center gap-4"
                style="opacity: 0.5; font-size: 0.75rem; font-weight: 700; color: #64748b;">
                <span>✦ SECURE DATA</span>
                <span>✦ ISO CERTIFIED</span>
                <span>✦ AI-DRIVEN</span>
            </div>
        </div>
    </div>



</body>

</html>
