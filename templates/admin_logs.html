<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Activity Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc; /* Bright & Fresh Background */
            margin: 0;
            color: #1e293b;
        }

        /* --- Sidebar Modern Look --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #ffffff; /* Premium White Sidebar */
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #e2e8f0;
            padding-top: 30px;
            z-index: 1000;
        }

        .sidebar h3 {
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #2563eb;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .sidebar a {
            display: block;
            color: #64748b;
            padding: 12px 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 5px 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .sidebar a:hover {
            background: #eff6ff;
            color: #2563eb;
            transform: translateX(5px);
        }

        /* --- Main Content --- */
        .main {
            margin-left: 260px;
            padding: 40px;
        }

        h2 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 5px;
        }

        /* --- Premium Table Card --- */
        .card-box {
            background: white;
            padding: 0; /* Removing padding to make table flush */
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            overflow: hidden; /* For rounded corners on table */
        }

        .table-container {
            padding: 20px;
        }

        /* --- Modern Table Styling --- */
        .table {
            margin-bottom: 0;
            border-collapse: separate;
            border-spacing: 0;
        }

        .table thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .table tbody td {
            padding: 15px 20px;
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .table-striped > tbody > tr:nth-of-type(odd) > * {
            --bs-table-accent-bg: #fcfcfd; /* Very subtle stripe */
        }

        .table-hover tbody tr:hover {
            background-color: #f1f5f9 !important;
            transition: background-color 0.2s ease;
        }

        /* Activity Badge Look (Optional refinement) */
        .activity-text {
            font-weight: 500;
            color: #2563eb;
        }

    </style>
</head>

<body>

    <div class="sidebar">
        <h3>ADMIN PANEL</h3>
        <a href="/admin_dashboard">Dashboard</a>
        <a href="/admin_logs">User Activity</a>
        <a href="/manage_users">Manage Users</a>
        <a href="/system_stats">System Analytics</a>
        <a href="/logout" style="margin-top: 50px; color: #ef4444;">Logout</a>
    </div>

    <div class="main">
        <h2>User Activity Logs</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Monitor all real-time user interactions and system events.</p>

        <div class="card-box">
            <div class="table-container">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Activity</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td style="font-weight: 600; color: #94a3b8;">#{{log[0]}}</td>
                            <td>
                                <span style="font-weight: 600;">{{log[1]}}</span>
                            </td>
                            <td class="activity-text">{{log[2]}}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
