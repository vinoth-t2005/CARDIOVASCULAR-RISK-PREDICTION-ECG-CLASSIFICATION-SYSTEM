<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart AI | Image Classification</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-bright: #f4f7fa;
            --primary-blue: #007aff;
            --primary-green: #10b981;
            --text-main: #1d1d1f;
            --card-white: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-bright);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            background-image: 
                radial-gradient(at 0% 0%, #e0e7ff 0px, transparent 50%),
                radial-gradient(at 100% 100%, #dcfce7 0px, transparent 50%);
        }

        .container { max-width: 800px; }

        /* --- PREMIUM UPLOAD CARD --- */
        .upload-card {
            background: var(--card-white);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid #ffffff;
            border-radius: 50px;
            padding: 60px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1.5px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* --- DRAG & DROP AREA --- */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 35px;
            padding: 50px 20px;
            background: #ffffff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover {
            border-color: var(--primary-blue);
            background: #f0f7ff;
            transform: scale(1.02);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: var(--primary-blue);
            transition: 0.3s;
        }

        .drop-zone:hover .icon-circle {
            background: var(--primary-blue);
            color: white;
            transform: rotate(-10deg);
        }

        /* --- CUSTOM FILE INPUT --- */
        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* --- CLASSIFY BUTTON --- */
        .btn-classify {
            background: var(--text-main);
            color: white !important;
            padding: 20px 60px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            width: 100%;
            margin-top: 30px;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-classify:hover {
            background: var(--primary-green);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.3);
        }

        .nav-back {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            display: inline-block;
            margin-top: 40px;
        }

        .nav-back:hover {
            color: var(--primary-blue);
            transform: translateX(-5px);
        }

        /* --- EXAMPLE IMAGES (Visual Aid) --- */
        .example-hint {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .hint-tag {
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="upload-card">
            <span class="badge rounded-pill px-3 py-2 mb-3" style="background: #eff6ff; color: #007aff; font-weight: 800; letter-spacing: 1px; font-size: 0.7rem;">
                AI NEURAL SCANNER V4.0
            </span>
            
            <h2>Image Classification</h2>
            <p class="subtitle">Upload medical scans for deep learning analysis</p>

            <form method="POST" enctype="multipart/form-data" id="uploadForm">
                <div class="drop-zone" id="dropZone">
                    <div class="icon-circle">📸</div>
                    <h5 class="fw-bold">Drag & Drop Scan Here</h5>
                    <p class="text-muted mb-0">or click to browse from device</p>
                    <input type="file" name="image" accept="image/*" required id="fileInput">
                </div>

                <div id="fileInfo" class="mt-3 fw-bold text-primary" style="display: none;"></div>

                <div class="example-hint">
                    <span class="hint-tag">ECG Waveform</span>
                    <span class="hint-tag">Chest X-Ray</span>
                    <span class="hint-tag">MRI Scan</span>
                </div>

                <button type="submit" class="btn-classify">
                    Execute AI Scan →
                </button>
            </form>

            <a href="/dashboard" class="nav-back">
                ← Return to Dashboard
            </a>
        </div>

        <p class="text-center mt-4 text-muted" style="font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;">
            SECURE ENCRYPTED UPLOAD • HIPAA COMPLIANT
        </p>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const dropZone = document.getElementById('dropZone');

        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                fileInfo.textContent = "Selected: " + this.files[0].name;
                fileInfo.style.display = "block";
                dropZone.style.borderColor = "var(--primary-green)";
                dropZone.style.background = "#f0fdf4";
            }
        });
    </script>

</body>
</html>
