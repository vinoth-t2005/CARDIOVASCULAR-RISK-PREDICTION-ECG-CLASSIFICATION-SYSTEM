<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            margin: 0;
            color: #1e293b;
        }

        /* --- Sidebar (Consistent with other pages) --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #ffffff;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #e2e8f0;
            padding-top: 30px;
            z-index: 1000;
        }

        .sidebar h3 {
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #2563eb;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .sidebar a {
            display: block;
            color: #64748b;
            padding: 12px 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 5px 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .sidebar a:hover {
            background: #eff6ff;
            color: #2563eb;
            transform: translateX(5px);
        }

        /* --- Main Content Area --- */
        .main {
            margin-left: 260px;
            padding: 40px;
        }

        h2 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .sub-text {
            color: #64748b;
            margin-bottom: 30px;
        }

        /* --- White Card Container for Table --- */
        .card-box {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            overflow: hidden; /* Ensures table corners match card */
        }

        .table-container {
            padding: 20px;
        }

        /* --- Modern Table UI --- */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 18px 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .table tbody td {
            padding: 16px 20px;
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        .table tbody tr:hover {
            background-color: #f9fafb;
        }

        /* Styling for Password dots/text */
        .password-field {
            font-family: monospace;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .user-id {
            font-weight: 600;
            color: #94a3b8;
        }

    </style>
</head>

<body>

    <div class="sidebar">
        <h3>ADMIN PANEL</h3>
        <a href="/admin_dashboard">Dashboard</a>
        <a href="/admin_logs">User Activity</a>
        <a href="/manage_users">Manage Users</a>
        <a href="/system_stats">System Analytics</a>
        <a href="/logout" style="margin-top: 50px; color: #ef4444;">Logout</a>
    </div>

    <div class="main">
        <h2>Manage Users</h2>
        <p class="sub-text">View and manage all registered user accounts in the system.</p>

        <div class="card-box">
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Password</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td class="user-id">#{{user[0]}}</td>
                            <td style="font-weight: 500;">{{user[1]}}</td>
                            <td>
                                <span class="password-field">{{user[2]}}</span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
