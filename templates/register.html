<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
            --btn-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-light: #f0f4f8;
            --glass-card: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            position: relative;
        }

        /* --- BRIGHT ANIMATED BACKGROUND SHAPES --- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: moveOrb 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: #FF9A8B; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #A18CD1; bottom: -150px; right: -150px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #84fab0; top: 50%; left: 50%; animation: moveCenter 15s infinite alternate; }

        @keyframes moveOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 150px) scale(1.2); }
        }

        @keyframes moveCenter {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-30%, -40%) scale(1.3); }
        }

        /* --- GLASS REGISTER CARD --- */
        .register-container {
            background: var(--glass-card);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 2px solid var(--glass-border);
            padding: 3.5rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1.5px;
            margin-bottom: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- FORM STYLING --- */
        form {
            text-align: left;
        }

        label {
            font-weight: 700;
            font-size: 0.9rem;
            color: #475569;
            margin-left: 5px;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box; /* Important to keep width consistent */
            margin-bottom: 20px;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
            background: #fff;
        }

        button {
            width: 100%;
            background: var(--btn-grad);
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(118, 75, 162, 0.3);
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02) translateY(-3px);
            box-shadow: 0 20px 40px rgba(118, 75, 162, 0.4);
        }

        /* --- FOOTER LINK --- */
        a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            transition: 0.3s;
        }

        a:hover {
            color: #764ba2;
        }

    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="register-container">
        <h2>User Register</h2>

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Register</button>
        </form>

        <a href="/login">Already have an account? Login</a>
    </div>

</body>
</html>
